<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi người em yêu ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 360px;
            width: 90%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative; /* Quan trọng để giới hạn nút */
        }

        h1 {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            position: relative;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            z-index: 10;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            /* Sử dụng transition để tạo hiệu ứng mượt mà */
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease;
            position: relative; /* Giữ nguyên trong flow của flexbox lúc đầu */
        }

        /* Popup thông báo khi bấm Có */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 320px;
            width: 100%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-content h2 {
            color: #ff4d6d;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="question">Tối anh mua trà sữa cho bé nhá? 🥰</h1>
        <div class="buttons">
            <button class="btn" id="yesBtn" onclick="showLove()">Có chứ! ❤️</button>
            <!-- Sử dụng ontouchstart và onmouseover cho cả điện thoại và máy tính -->
            <button class="btn" id="noBtn" onmouseover="runAway()" ontouchstart="runAway(event)">Không 😜</button>
        </div>
    </div>

    <div class="popup" id="lovePopup">
        <div class="popup-content">
            <h2>Em biết ngay mà! 😘</h2>
            <p>Yêu anh nhất trên đời! hun anh 1000 cái ❤️</p>
            <button class="btn" style="background-color: #ff4d6d; color: white; margin-top: 15px;" onclick="closePopup()">Chốt đơn! ✨</button>
        </div>
    </div>

    <script>
        function runAway(event) {
            if (event && event.type === 'touchstart') {
                event.preventDefault(); // Ngăn chặn zoom/cuộn trên mobile
            }

            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('mainContainer');

            // 1. Chuyển nút "Không" sang absolute khi bắt đầu nhảy
            noBtn.style.position = 'absolute';

            // 2. Lấy kích thước thực tế của khung trắng và nút
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            // 3. Tính toán phạm vi tối đa nút có thể nhảy (nằm hoàn toàn trong container)
            // Có trừ đi padding của container (30px mỗi bên)
            const padding = 30;
            const maxX = containerRect.width - btnRect.width - (padding * 2);
            const maxY = containerRect.height - btnRect.height - (padding * 2);

            // 4. Tính toán vị trí ngẫu nhiên
            let randomX = Math.floor(Math.random() * maxX);
            let randomY = Math.floor(Math.random() * maxY);

            // 5. Di chuyển nút bằng transform (mượt mà và chính xác hơn)
            // Cần dịch chuyển một chút vì ban đầu nút nằm ở giữa flexbox
            const currentLeft = btnRect.left - containerRect.left - padding;
            const currentTop = btnRect.top - containerRect.top - padding;

            const moveX = randomX - currentLeft;
            const moveY = randomY - currentTop;

            noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }

        function showLove() {
            document.getElementById('lovePopup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('lovePopup').style.display = 'none';
        }
    </script>
</body>
</html>
