<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người em yêu ❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            max-width: 360px;
            width: 90%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            position: relative;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-weight: bold;
            touch-action: manipulation; /* Tối ưu hóa phản hồi chạm trên điện thoại */
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            z-index: 10;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            transition: all 0.2s ease; /* Tạo hiệu ứng mượt mà khi nút di chuyển */
        }

        /* Popup thông báo khi bấm Có */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 320px;
            width: 100%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-content h2 {
            color: #ff4d6d;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Anh có yêu em siêu nhiều nhiều không? 🥰</h1>
        <div class="buttons">
            <button class="btn" id="yesBtn" onclick="showLove()">Có chứ! ❤️</button>
            <button class="btn" id="noBtn" onmouseover="runAway()" ontouchstart="runAway(event)" onclick="runAway()">Không 😜</button>
        </div>
    </div>

    <!-- Popup ngọt ngào -->
    <div class="popup" id="lovePopup">
        <div class="popup-content">
            <h2>Em biết ngay mà! 😘</h2>
            <p>Yêu anh nhất trên đời! Tối nay bao em đi ăn nhé! ❤️</p>
            <button class="btn" style="background-color: #ff4d6d; color: white;" onclick="closePopup()">Chốt đơn! ✨</button>
        </div>
    </div>

    <script>
        function runAway(event) {
            // Ngăn chặn hành vi cuộn hoặc zoom mặc định trên điện thoại khi chạm
            if (event) {
                event.preventDefault();
            }

            const noBtn = document.getElementById('noBtn');
            const container = document.querySelector('.container');
            
            // Lấy kích thước vùng giới hạn để nút không nhảy ra ngoài khung trắng
            const padding = 15;
            const maxX = container.clientWidth - noBtn.clientWidth - padding;
            const maxY = container.clientHeight - noBtn.clientHeight - padding;

            // Tính toán vị trí ngẫu nhiên mới
            let randomX = Math.floor(Math.random() * maxX);
            let randomY = Math.floor(Math.random() * maxY);

            // Đảm bảo nút không nhảy đè lên nút "Có" ở bên trái
            if (randomX < (container.clientWidth / 2) && randomY < 60) {
                randomX = maxX - padding;
                randomY = maxY - padding;
            }

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function showLove() {
            document.getElementById('lovePopup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('lovePopup').style.display = 'none';
        }
    </script>
</body>
</html>
